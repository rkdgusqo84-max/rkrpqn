<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f2f2f7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="format-detection" content="telephone=no" />
  <title>남은 금액</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f2f2f7;
      --card: rgba(255,255,255,.94);
      --text: #000;
      --secondary-text: #6e6e73;
      --tertiary-text: #8e8e93;
      --separator: rgba(60,60,67,.16);
      --fill: rgba(118,118,128,.12);
      --blue: #007aff;
      --blue-pressed: #0062cc;
      --red: #ff3b30;
      --green: #34c759;
      --shadow: 0 14px 38px rgba(0,0,0,.08);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html { background: var(--bg); }

    body {
      margin: 0;
      min-height: 100dvh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 15% -10%, rgba(0,122,255,.13), transparent 28rem),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    button, input { font: inherit; }
    button { touch-action: manipulation; }

    .app {
      width: min(100%, 680px);
      margin: 0 auto;
      padding:
        max(18px, env(safe-area-inset-top))
        16px
        calc(44px + env(safe-area-inset-bottom));
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 44px;
      margin-bottom: 12px;
      padding: 0 4px;
    }

    .topbar h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.15;
      letter-spacing: -.035em;
    }

    .icon-button {
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 50%;
      background: rgba(255,255,255,.74);
      color: var(--blue);
      box-shadow: 0 4px 18px rgba(0,0,0,.05);
      cursor: pointer;
    }

    .icon-button:active { transform: scale(.94); background: #fff; }
    .icon-button svg { width: 22px; height: 22px; }

    .balance-card {
      position: relative;
      overflow: hidden;
      min-height: 240px;
      padding: 28px 24px 22px;
      border-radius: 30px;
      background: linear-gradient(145deg, #0b84ff 0%, #0066e6 58%, #0052bd 100%);
      color: #fff;
      box-shadow: 0 20px 48px rgba(0,105,220,.27);
    }

    .balance-card::after {
      content: "";
      position: absolute;
      width: 250px;
      height: 250px;
      right: -110px;
      top: -110px;
      border-radius: 50%;
      background: rgba(255,255,255,.12);
    }

    .balance-label {
      position: relative;
      z-index: 1;
      font-size: 15px;
      font-weight: 600;
      color: rgba(255,255,255,.75);
    }

    .remaining {
      position: relative;
      z-index: 1;
      margin-top: 9px;
      font-size: clamp(42px, 12vw, 68px);
      font-weight: 750;
      line-height: 1;
      letter-spacing: -.055em;
      overflow-wrap: anywhere;
    }

    .balance-meta {
      position: absolute;
      z-index: 1;
      left: 24px;
      right: 24px;
      bottom: 22px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .balance-meta.single { grid-template-columns: 1fr; }

    .meta-cell {
      min-width: 0;
      padding: 13px 14px;
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 18px;
      background: rgba(255,255,255,.12);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .meta-cell span {
      display: block;
      margin-bottom: 4px;
      color: rgba(255,255,255,.68);
      font-size: 12px;
      font-weight: 600;
    }

    .meta-cell strong {
      display: block;
      overflow: hidden;
      font-size: 17px;
      line-height: 1.25;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .section-title {
      margin: 28px 4px 9px;
      color: var(--secondary-text);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .01em;
      text-transform: uppercase;
    }

    .group {
      overflow: hidden;
      border: .5px solid rgba(0,0,0,.025);
      border-radius: 20px;
      background: var(--card);
      box-shadow: 0 8px 26px rgba(0,0,0,.045);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .field-row {
      display: grid;
      grid-template-columns: 38px minmax(0,1fr);
      align-items: center;
      min-height: 60px;
      margin-left: 16px;
      padding-right: 16px;
      border-bottom: .5px solid var(--separator);
    }

    .field-row:last-child { border-bottom: 0; }

    .field-icon {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: var(--green);
      color: #fff;
      font-size: 17px;
      font-weight: 700;
    }

    .field-icon.memo { background: #ff9500; }

    input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 17px;
      line-height: 1.4;
    }

    input::placeholder { color: var(--tertiary-text); opacity: 1; }

    .add-button {
      width: 100%;
      min-height: 54px;
      margin-top: 12px;
      border: 0;
      border-radius: 17px;
      background: var(--blue);
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      box-shadow: 0 8px 20px rgba(0,122,255,.2);
      cursor: pointer;
    }

    .add-button:active { transform: scale(.985); background: var(--blue-pressed); }

    .history-group { min-height: 88px; }

    .expense-item {
      display: grid;
      grid-template-columns: 40px minmax(0,1fr) auto 30px;
      align-items: center;
      gap: 10px;
      min-height: 68px;
      margin-left: 16px;
      padding: 9px 12px 9px 0;
      border-bottom: .5px solid var(--separator);
    }

    .expense-item:last-child { border-bottom: 0; }

    .expense-avatar {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border-radius: 13px;
      background: var(--fill);
      font-size: 19px;
    }

    .expense-copy { min-width: 0; }
    .expense-name {
      overflow: hidden;
      font-size: 16px;
      font-weight: 600;
      line-height: 1.25;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .expense-date {
      margin-top: 3px;
      color: var(--tertiary-text);
      font-size: 12px;
    }

    .expense-amount {
      color: var(--text);
      font-size: 16px;
      font-weight: 650;
      white-space: nowrap;
    }

    .delete-button {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      background: var(--fill);
      color: var(--tertiary-text);
      font-size: 18px;
      cursor: pointer;
    }

    .delete-button:active { color: var(--red); transform: scale(.92); }

    .empty {
      padding: 29px 18px;
      color: var(--tertiary-text);
      font-size: 15px;
      text-align: center;
    }

    .reset-button {
      display: block;
      margin: 14px auto 0;
      padding: 10px 16px;
      border: 0;
      background: transparent;
      color: var(--red);
      font-size: 14px;
      cursor: pointer;
    }


    .budget-modal { position: fixed; inset: 0; z-index: 1000; }
    .budget-modal[hidden] { display: none; }
    .budget-backdrop { position: absolute; inset: 0; width: 100%; border: 0; background: rgba(0,0,0,.28); }
    .budget-sheet { position: absolute; left: 0; right: 0; bottom: 0; width: min(100%,680px); margin: 0 auto; padding: 10px 16px calc(20px + env(safe-area-inset-bottom)); border-radius: 28px 28px 0 0; background: #f2f2f7; box-shadow: 0 -18px 48px rgba(0,0,0,.18); animation: sheetIn .22s ease-out; }
    .sheet-handle { width: 38px; height: 5px; margin: 0 auto 14px; border-radius: 999px; background: rgba(60,60,67,.28); }
    .sheet-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .sheet-header h2 { margin:0; font-size:22px; letter-spacing:-.03em; }
    .sheet-close { border:0; background:transparent; color:var(--blue); font-size:16px; font-weight:700; }
    .budget-field { display:flex; align-items:center; gap:10px; min-height:60px; padding:0 16px; border-radius:18px; background:#fff; }
    .budget-field span { color:var(--green); font-size:20px; font-weight:700; }
    body.modal-open { overflow:hidden; }

    .toast {
      position: fixed;
      z-index: 2000;
      left: 50%;
      bottom: calc(22px + env(safe-area-inset-bottom));
      max-width: calc(100% - 32px);
      padding: 11px 16px;
      border-radius: 999px;
      background: rgba(20,20,22,.88);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 10px);
      transition: opacity .2s ease, transform .2s ease;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes sheetIn { from { transform: translateY(100%); } to { transform: translateY(0); } }

    @media (min-width: 700px) {
      .app { padding-top: 34px; }
    }

    @media (max-width: 380px) {
      .balance-card { min-height: 224px; padding-left: 20px; padding-right: 20px; }
      .balance-meta { left: 20px; right: 20px; }
      .expense-item { grid-template-columns: 36px minmax(0,1fr) auto 28px; gap: 8px; }
      .expense-avatar { width: 36px; height: 36px; }
      .expense-amount { font-size: 15px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1>가계부</h1>
      <button id="openBudgetModal" class="icon-button" type="button" aria-label="기준 금액 설정">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06-2.12 2.12-.06-.06a1.7 1.7 0 0 0-1.88-.34 1.7 1.7 0 0 0-1.04 1.56V20.3h-3v-.08a1.7 1.7 0 0 0-1.04-1.56 1.7 1.7 0 0 0-1.88.34l-.06.06-2.12-2.12.06-.06A1.7 1.7 0 0 0 7 15a1.7 1.7 0 0 0-1.56-1.04H5.3v-3h.14A1.7 1.7 0 0 0 7 9.92a1.7 1.7 0 0 0-.34-1.88L6.6 7.98l2.12-2.12.06.06a1.7 1.7 0 0 0 1.88.34A1.7 1.7 0 0 0 11.7 4.7V4.6h3v.1a1.7 1.7 0 0 0 1.04 1.56 1.7 1.7 0 0 0 1.88-.34l.06-.06 2.12 2.12-.06.06a1.7 1.7 0 0 0-.34 1.88 1.7 1.7 0 0 0 1.56 1.04h.14v3h-.14A1.7 1.7 0 0 0 19.4 15Z"></path>
        </svg>
      </button>
    </header>

    <section class="balance-card" aria-label="지출 요약">
      <div class="balance-label">남은 금액</div>
      <div id="remaining" class="remaining">0원</div>
      <div class="balance-meta single">
        <div class="meta-cell">
          <span>지출 합계</span>
          <strong id="spentDisplay">0원</strong>
        </div>
      </div>
    </section>

    <div class="section-title">지출 추가</div>
    <section class="group" aria-label="지출 입력">
      <label class="field-row">
        <span class="field-icon">₩</span>
        <input id="expenseAmount" type="text" inputmode="numeric" enterkeyhint="next" autocomplete="off" placeholder="금액" aria-label="지출 금액" />
      </label>
      <label class="field-row">
        <span class="field-icon memo">✎</span>
        <input id="expenseName" type="text" enterkeyhint="done" autocomplete="off" placeholder="메모 (선택)" aria-label="지출 메모" />
      </label>
    </section>
    <button id="addExpense" class="add-button" type="button">지출 추가</button>

    <div class="section-title">최근 지출</div>
    <section id="expenseList" class="group history-group" aria-live="polite"></section>
    <button id="resetAll" class="reset-button" type="button">모든 데이터 초기화</button>
  </main>

  <div id="budgetModal" class="budget-modal" hidden>
    <button class="budget-backdrop" type="button" data-close-budget aria-label="닫기"></button>
    <section class="budget-sheet" role="dialog" aria-modal="true" aria-labelledby="budgetTitle">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <h2 id="budgetTitle">기준 금액 설정</h2>
        <button id="closeBudgetModal" class="sheet-close" type="button">완료</button>
      </div>
      <label class="budget-field">
        <span>₩</span>
        <input id="budgetInput" type="text" inputmode="numeric" enterkeyhint="done" autocomplete="off" placeholder="기준 금액" aria-label="기준 금액" />
      </label>
      <button id="saveBudget" class="add-button" type="button">금액 저장</button>
    </section>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    const STORAGE_KEY = "simple-budget-dashboard-v1";
    let state = loadState();
    let toastTimer;
    let resetArmed = false;
    let resetTimer;

    const el = {
      remaining: document.getElementById("remaining"),
      spentDisplay: document.getElementById("spentDisplay"),
      budgetInput: document.getElementById("budgetInput"),
      budgetModal: document.getElementById("budgetModal"),
      openBudgetModal: document.getElementById("openBudgetModal"),
      closeBudgetModal: document.getElementById("closeBudgetModal"),
      saveBudget: document.getElementById("saveBudget"),
      expenseName: document.getElementById("expenseName"),
      expenseAmount: document.getElementById("expenseAmount"),
      addExpense: document.getElementById("addExpense"),
      expenseList: document.getElementById("expenseList"),
      resetAll: document.getElementById("resetAll"),
      toast: document.getElementById("toast")
    };

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (saved && Array.isArray(saved.expenses)) {
          return { budget: Number(saved.budget || 0), expenses: saved.expenses };
        }
      } catch (_) {}
      return { budget: 0, expenses: [] };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function parseMoney(value) {
      const digits = String(value).replace(/[^0-9]/g, "");
      return digits ? Number(digits) : 0;
    }

    function formatInput(value) {
      const number = parseMoney(value);
      return number ? number.toLocaleString("ko-KR") : "";
    }

    function formatWon(value) {
      return Number(value || 0).toLocaleString("ko-KR") + "원";
    }

    function totalSpent() {
      return state.expenses.reduce((sum, item) => sum + Number(item.amount || 0), 0);
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function showToast(message) {
      clearTimeout(toastTimer);
      el.toast.textContent = message;
      el.toast.classList.add("show");
      toastTimer = setTimeout(() => el.toast.classList.remove("show"), 1600);
    }

    function render() {
      const spent = totalSpent();
      el.remaining.textContent = formatWon(state.budget - spent);
      el.spentDisplay.textContent = formatWon(spent);
      el.budgetInput.value = state.budget ? state.budget.toLocaleString("ko-KR") : "";

      if (!state.expenses.length) {
        el.expenseList.innerHTML = '<div class="empty">아직 지출 내역이 없습니다.</div>';
        return;
      }

      el.expenseList.innerHTML = state.expenses
        .slice()
        .reverse()
        .map(item => `
          <article class="expense-item">
            <div class="expense-avatar">🧾</div>
            <div class="expense-copy">
              <div class="expense-name">${escapeHtml(item.name || "지출")}</div>
              <div class="expense-date">${escapeHtml(item.date || "")}</div>
            </div>
            <div class="expense-amount">-${formatWon(item.amount)}</div>
            <button class="delete-button" type="button" data-id="${item.id}" aria-label="${escapeHtml(item.name || "지출")} 삭제">×</button>
          </article>
        `).join("");

      el.expenseList.querySelectorAll("[data-id]").forEach(button => {
        button.addEventListener("click", () => {
          const id = Number(button.dataset.id);
          state.expenses = state.expenses.filter(item => Number(item.id) !== id);
          saveState();
          render();
          showToast("지출을 삭제했습니다");
        });
      });
    }

    function addExpense() {
      const amount = parseMoney(el.expenseAmount.value);
      const name = el.expenseName.value.trim() || "지출";

      if (!amount) {
        showToast("지출 금액을 입력해 주세요");
        el.expenseAmount.focus();
        return;
      }

      state.expenses.push({
        id: Date.now(),
        name,
        amount,
        date: new Intl.DateTimeFormat("ko-KR", {
          month: "long",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit"
        }).format(new Date())
      });

      el.expenseAmount.value = "";
      el.expenseName.value = "";
      saveState();
      render();
      showToast("지출을 추가했습니다");
      el.expenseAmount.focus({ preventScroll: true });
    }

    el.expenseAmount.addEventListener("input", () => {
      const cursorAtEnd = el.expenseAmount.selectionStart === el.expenseAmount.value.length;
      el.expenseAmount.value = formatInput(el.expenseAmount.value);
      if (cursorAtEnd) el.expenseAmount.setSelectionRange(el.expenseAmount.value.length, el.expenseAmount.value.length);
    });

    el.addExpense.addEventListener("click", addExpense);

    el.expenseAmount.addEventListener("keydown", event => {
      if (event.key === "Enter") {
        event.preventDefault();
        el.expenseName.focus();
      }
    });

    el.expenseName.addEventListener("keydown", event => {
      if (event.key === "Enter") {
        event.preventDefault();
        addExpense();
      }
    });

    function openBudgetModal() {
      el.budgetModal.hidden = false;
      document.body.classList.add("modal-open");
      setTimeout(() => { el.budgetInput.focus(); el.budgetInput.select(); }, 50);
    }

    function closeBudgetModal() {
      el.budgetModal.hidden = true;
      document.body.classList.remove("modal-open");
    }

    el.openBudgetModal.addEventListener("click", openBudgetModal);
    el.closeBudgetModal.addEventListener("click", closeBudgetModal);
    el.budgetModal.querySelector("[data-close-budget]").addEventListener("click", closeBudgetModal);
    el.budgetInput.addEventListener("input", () => { el.budgetInput.value = formatInput(el.budgetInput.value); });
    el.budgetInput.addEventListener("keydown", event => { if (event.key === "Enter") { event.preventDefault(); el.saveBudget.click(); } });
    el.saveBudget.addEventListener("click", () => {
      state.budget = parseMoney(el.budgetInput.value);
      saveState();
      render();
      closeBudgetModal();
      showToast("기준 금액을 저장했습니다");
    });

    el.resetAll.addEventListener("click", () => {
      if (!resetArmed) {
        resetArmed = true;
        el.resetAll.textContent = "한 번 더 눌러 초기화";
        el.resetAll.style.fontWeight = "700";
        showToast("한 번 더 누르면 모두 삭제됩니다");
        clearTimeout(resetTimer);
        resetTimer = setTimeout(() => {
          resetArmed = false;
          el.resetAll.textContent = "모든 데이터 초기화";
          el.resetAll.style.fontWeight = "";
        }, 3500);
        return;
      }

      clearTimeout(resetTimer);
      localStorage.removeItem(STORAGE_KEY);
      state = { budget: 0, expenses: [] };
      el.expenseAmount.value = "";
      el.expenseName.value = "";
      resetArmed = false;
      el.resetAll.textContent = "모든 데이터 초기화";
      el.resetAll.style.fontWeight = "";
      render();
      showToast("모든 데이터를 초기화했습니다");
    });

    render();
  </script>
</body>
</html>
