<!DOCTYPE html>
<html lang="ko">

  <title>남은 돈</title>
  <style>
    :root{--bg:#f5f5f7;--surface:#fff;--surface2:#f2f2f7;--text:#1d1d1f;--muted:#6e6e73;--line:rgba(60,60,67,.14);--accent:#007aff;--danger:#ff3b30;--success:#34c759;--shadow:0 14px 42px rgba(0,0,0,.08);--radius:24px}
    @media(prefers-color-scheme:dark){:root{--bg:#000;--surface:#1c1c1e;--surface2:#2c2c2e;--text:#f5f5f7;--muted:#a1a1a6;--line:rgba(255,255,255,.12);--shadow:0 16px 44px rgba(0,0,0,.45)}}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Pretendard",sans-serif;background:var(--bg);color:var(--text)}button,input{font:inherit}button{cursor:pointer}.app{width:min(100%,980px);margin:auto;padding:max(18px,env(safe-area-inset-top)) 14px max(32px,env(safe-area-inset-bottom))}.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.title{font-size:28px;font-weight:800;letter-spacing:-.04em}.subtitle{font-size:13px;color:var(--muted);margin-top:3px}.icon-btn{border:1px solid var(--line);background:var(--surface);color:var(--text);border-radius:14px;padding:10px 13px;font-weight:700}.sync{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:13px 15px;margin-bottom:14px}.sync-left{display:flex;gap:10px;align-items:center;min-width:0}.dot{width:9px;height:9px;border-radius:50%;background:#ff9f0a;box-shadow:0 0 0 4px rgba(255,159,10,.14);flex:none}.dot.online{background:var(--success);box-shadow:0 0 0 4px rgba(52,199,89,.14)}.sync-title{font-size:14px;font-weight:750}.sync-sub{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.hero{background:linear-gradient(145deg,#1c1c1e,#343438);color:#fff;border-radius:30px;padding:26px 22px;box-shadow:var(--shadow);margin-bottom:14px}.month-row{display:flex;align-items:center;justify-content:space-between;gap:10px}.month-select{display:flex;gap:8px;align-items:center}.month-btn{width:36px;height:36px;border-radius:12px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.1);color:#fff}.month-label{font-size:15px;font-weight:700;min-width:110px;text-align:center}.hero-label{margin-top:28px;font-size:13px;color:rgba(255,255,255,.7)}.remaining{font-size:clamp(42px,11vw,68px);font-weight:800;letter-spacing:-.06em;line-height:1;margin-top:6px}.remaining.negative{color:#ff6961}.hero-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:24px}.meta-box{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:13px}.meta-label{font-size:11px;color:rgba(255,255,255,.65)}.meta-value{font-size:19px;font-weight:750;margin-top:5px}.progress{height:8px;border-radius:999px;background:rgba(255,255,255,.14);overflow:hidden;margin-top:18px}.progress>span{display:block;height:100%;background:#fff;border-radius:inherit;width:0;transition:width .3s}.grid{display:grid;gap:14px}.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:0 8px 28px rgba(0,0,0,.04)}.card-title{font-size:18px;font-weight:800;letter-spacing:-.03em}.card-sub{font-size:12px;color:var(--muted);margin-top:4px}.form{display:grid;gap:12px;margin-top:16px}.field label{display:block;font-size:12px;color:var(--muted);margin:0 0 7px 2px}.field input{width:100%;border:1px solid var(--line);background:var(--surface2);color:var(--text);border-radius:15px;padding:14px 15px;outline:none}.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,122,255,.13)}.amount-input{font-size:24px;font-weight:750;letter-spacing:-.03em}.primary{width:100%;border:0;border-radius:15px;background:var(--accent);color:#fff;padding:15px;font-weight:800}.seg{display:flex;background:var(--surface2);padding:4px;border-radius:13px;margin-top:14px}.seg button{flex:1;border:0;background:transparent;color:var(--muted);padding:9px;border-radius:10px;font-weight:700}.seg button.active{background:var(--surface);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.08)}.list{display:grid;gap:9px;margin-top:14px}.day-group{margin-top:8px}.day-head{font-size:12px;color:var(--muted);font-weight:700;padding:7px 2px}.expense{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--surface2);border-radius:16px;padding:13px 14px}.expense-main{min-width:0}.expense-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.expense-date{font-size:11px;color:var(--muted);margin-top:3px}.expense-right{text-align:right;flex:none}.expense-amount{font-size:16px;font-weight:800}.expense-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:5px}.text-btn{border:0;background:transparent;color:var(--accent);padding:0;font-size:11px;font-weight:700}.text-btn.danger{color:var(--danger)}.empty{text-align:center;color:var(--muted);padding:28px 10px;font-size:13px}.sheet-wrap{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:flex-end;justify-content:center;z-index:50;padding:12px}.sheet-wrap.open{display:flex}.sheet{width:min(100%,520px);background:var(--surface);border-radius:26px;padding:18px;box-shadow:0 30px 90px rgba(0,0,0,.3);margin-bottom:max(0px,env(safe-area-inset-bottom))}.handle{width:40px;height:5px;background:var(--line);border-radius:99px;margin:0 auto 17px}.sheet h2{font-size:22px;margin:0 0 6px}.sheet p{font-size:13px;color:var(--muted);line-height:1.5}.sheet-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.secondary{border:1px solid var(--line);background:var(--surface2);color:var(--text);border-radius:14px;padding:13px;font-weight:750}.danger-wide{width:100%;border:1px solid rgba(255,59,48,.3);background:transparent;color:var(--danger);border-radius:14px;padding:13px;font-weight:800;margin-top:10px}.message{min-height:18px;font-size:12px;color:var(--muted);margin:8px 0}.setup{font-size:12px;color:var(--muted);line-height:1.55;background:var(--surface2);padding:12px;border-radius:14px;margin-top:12px}.footer{text-align:center;color:var(--muted);font-size:11px;margin-top:18px}@media(min-width:760px){.app{padding-left:24px;padding-right:24px}.grid{grid-template-columns:minmax(320px,.8fr) minmax(400px,1.2fr);align-items:start}.hero{padding:30px}.card{padding:22px}.sheet-wrap{align-items:center}}
  </style>
</head>
<body>
<main class="app">
  <header class="topbar"><div><div class="title">남은 돈</div><div class="subtitle" id="todayText"></div></div><button class="icon-btn" id="accountBtn">로그인</button></header>
  <section class="sync"><div class="sync-left"><span class="dot" id="syncDot"></span><div><div class="sync-title" id="syncTitle">기기 저장 모드</div><div class="sync-sub" id="syncSub">로그인하면 모든 기기에서 자동 동기화됩니다.</div></div></div><button class="icon-btn" id="settingsBtn">설정</button></section>

  <section class="hero">
    <div class="month-row"><button class="month-btn" id="prevMonth">‹</button><div class="month-label" id="monthLabel"></div><button class="month-btn" id="nextMonth">›</button></div>
    <div class="hero-label">이번 달 남은 금액</div><div class="remaining" id="remainingAmount">0원</div>
    <div class="hero-meta"><div class="meta-box"><div class="meta-label">기준 금액</div><div class="meta-value" id="budgetAmount">0원</div></div><div class="meta-box"><div class="meta-label">사용 금액</div><div class="meta-value" id="spentAmount">0원</div></div></div>
    <div class="progress"><span id="budgetProgress"></span></div>
  </section>

  <section class="grid">
    <article class="card"><div class="card-title">지출 추가</div><div class="card-sub">금액, 품목, 날짜만 빠르게 기록합니다.</div><div class="form">
      <div class="field"><label for="amountInput">금액</label><input id="amountInput" class="amount-input" type="text" inputmode="numeric" placeholder="0" autocomplete="off"></div>
      <div class="field"><label for="itemInput">품목</label><input id="itemInput" type="text" placeholder="예: 점심, 커피, 주유"></div>
      <div class="field"><label for="dateInput">날짜</label><input id="dateInput" type="date"></div>
      <button class="primary" id="saveExpense">지출 추가</button><div class="message" id="formMessage"></div>
    </div></article>

    <article class="card"><div class="card-title">지출 내역</div><div class="card-sub" id="countText">0건</div><div class="seg"><button class="active" data-view="all">전체</button><button data-view="recent">최근 7일</button></div><div class="list" id="expenseList"></div></article>
  </section>
  <div class="footer" id="footerText">로그인 전에는 이 기기에 저장됩니다.</div>
</main>

<div class="sheet-wrap" id="accountSheet"><div class="sheet"><div class="handle"></div><div id="signedOut"><h2>계정</h2><p>같은 이메일로 로그인하면 아이폰, 아이패드, 컴퓨터에서 같은 가계부를 볼 수 있습니다.</p><div class="form"><div class="field"><label>이메일</label><input id="emailInput" type="email" autocomplete="email"></div><div class="field"><label>비밀번호</label><input id="passwordInput" type="password" autocomplete="current-password"></div><div class="sheet-actions"><button class="secondary" id="signupBtn">회원가입</button><button class="primary" id="loginBtn">로그인</button></div><div class="message" id="authMessage"></div><div class="setup" id="firebaseSetup" hidden>현재 Firebase 설정값이 비어 있습니다. index.html 안의 <b>FIREBASE_CONFIG</b>를 입력한 뒤 사용할 수 있습니다.</div></div></div><div id="signedIn" hidden><h2>로그인됨</h2><p id="signedInEmail"></p><button class="danger-wide" id="logoutBtn">로그아웃</button></div></div></div>

<div class="sheet-wrap" id="settingsSheet"><div class="sheet"><div class="handle"></div><h2>월 기준 금액</h2><p id="settingsMonthText"></p><div class="field"><label>기준 금액</label><input id="budgetInput" type="text" inputmode="numeric" placeholder="예: 800000"></div><button class="primary" id="saveBudget">저장</button><div class="message" id="settingsMessage"></div></div></div>

<div class="sheet-wrap" id="editSheet"><div class="sheet"><div class="handle"></div><h2>지출 수정</h2><div class="form"><div class="field"><label>금액</label><input id="editAmount" type="text" inputmode="numeric"></div><div class="field"><label>품목</label><input id="editItem" type="text"></div><div class="field"><label>날짜</label><input id="editDate" type="date"></div><button class="primary" id="saveEdit">수정 저장</button><button class="danger-wide" id="deleteEdit">삭제</button></div></div></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js';
import { getAuth, setPersistence, browserLocalPersistence, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js';
import { initializeFirestore, persistentLocalCache, persistentMultipleTabManager, doc, setDoc, getDoc, collection, addDoc, updateDoc, deleteDoc, query, where, orderBy, onSnapshot, serverTimestamp, writeBatch } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js';

const FIREBASE_CONFIG={
  apiKey:'AIzaSyBxOsjRUdFtv2DsVOv9ZhB8CdZlWdDqQ7A',
  authDomain:'budget-2fddd.firebaseapp.com',
  projectId:'budget-2fddd',
  storageBucket:'budget-2fddd.firebasestorage.app',
  messagingSenderId:'850401998666',
  appId:'1:850401998666:web:e42e842b6c96d4a6d7f3b3',
  measurementId:'G-K4W3BK10CQ'
};
const $=id=>document.getElementById(id);const money=n=>`${Math.round(Number(n)||0).toLocaleString('ko-KR')}원`;const monthKey=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;const todayKey=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`};
const state={month:new Date(new Date().getFullYear(),new Date().getMonth(),1),budget:0,expenses:[],view:'all',user:null,auth:null,db:null,unsubBudget:null,unsubExpenses:null,editing:null,cloudReady:false};
const configured=()=>!Object.values(FIREBASE_CONFIG).some(v=>String(v).includes('YOUR_'));
const localBudgetKey=()=>`budget_${monthKey(state.month)}`;const localExpensesKey=()=>`expenses_${monthKey(state.month)}`;
function parseAmount(v){return Number(String(v).replace(/[^0-9]/g,''))||0}function formatInput(el){const n=parseAmount(el.value);el.value=n?n.toLocaleString('ko-KR'):''}
function loadLocal(){state.budget=Number(localStorage.getItem(localBudgetKey())||0);state.expenses=JSON.parse(localStorage.getItem(localExpensesKey())||'[]');render()}
function saveLocal(){localStorage.setItem(localBudgetKey(),String(state.budget));localStorage.setItem(localExpensesKey(),JSON.stringify(state.expenses))}
function monthRange(){const start=`${monthKey(state.month)}-01`;const endD=new Date(state.month.getFullYear(),state.month.getMonth()+1,1);const end=`${monthKey(endD)}-01`;return{start,end}}
function render(){const spent=state.expenses.reduce((s,e)=>s+Number(e.amount||0),0);const remain=state.budget-spent;$('monthLabel').textContent=state.month.toLocaleDateString('ko-KR',{year:'numeric',month:'long'});$('settingsMonthText').textContent=`${$('monthLabel').textContent} 기준 금액을 설정합니다.`;$('remainingAmount').textContent=money(remain);$('remainingAmount').classList.toggle('negative',remain<0);$('budgetAmount').textContent=money(state.budget);$('spentAmount').textContent=money(spent);$('budgetProgress').style.width=`${state.budget?Math.min(100,spent/state.budget*100):0}%`;renderList()}
function filteredExpenses(){if(state.view==='all')return state.expenses;const cutoff=new Date();cutoff.setDate(cutoff.getDate()-6);cutoff.setHours(0,0,0,0);return state.expenses.filter(e=>new Date(`${e.date}T00:00:00`)>=cutoff)}
function renderList(){const list=$('expenseList');const arr=filteredExpenses().slice().sort((a,b)=>b.date.localeCompare(a.date)||(b.createdAtMs||0)-(a.createdAtMs||0));$('countText').textContent=`${arr.length}건`;list.innerHTML='';if(!arr.length){list.innerHTML='<div class="empty">이 달의 지출이 없습니다.</div>';return}let current='';arr.forEach(e=>{if(e.date!==current){current=e.date;const h=document.createElement('div');h.className='day-head';h.textContent=new Date(`${e.date}T00:00:00`).toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});list.appendChild(h)}const row=document.createElement('div');row.className='expense';row.innerHTML=`<div class="expense-main"><div class="expense-name"></div><div class="expense-date">${e.date}</div></div><div class="expense-right"><div class="expense-amount">-${money(e.amount)}</div><div class="expense-actions"><button class="text-btn">수정</button><button class="text-btn danger">삭제</button></div></div>`;row.querySelector('.expense-name').textContent=e.item||'지출';row.querySelector('.text-btn').onclick=()=>openEdit(e);row.querySelector('.danger').onclick=()=>removeExpense(e);list.appendChild(row)})}
async function setBudget(){const value=parseAmount($('budgetInput').value);state.budget=value;if(state.user){await setDoc(doc(state.db,'users',state.user.uid,'budgets',monthKey(state.month)),{amount:value,updatedAt:serverTimestamp()},{merge:true})}else{saveLocal();render()}$('settingsMessage').textContent='저장되었습니다.';setTimeout(()=>$('settingsSheet').classList.remove('open'),300)}
async function addExpense(){const amount=parseAmount($('amountInput').value),item=$('itemInput').value.trim(),date=$('dateInput').value;if(!amount){$('formMessage').textContent='금액을 입력해주세요.';return}if(!date){$('formMessage').textContent='날짜를 선택해주세요.';return}const data={amount,item:item||'지출',date,month:date.slice(0,7),createdAtMs:Date.now()};if(state.user){await addDoc(collection(state.db,'users',state.user.uid,'expenses'),{...data,createdAt:serverTimestamp()})}else{state.expenses.unshift({id:crypto.randomUUID(),...data});saveLocal();render()}$('amountInput').value='';$('itemInput').value='';$('dateInput').value=todayKey();$('formMessage').textContent=state.user?'클라우드에 저장되었습니다.':'이 기기에 저장되었습니다.';$('amountInput').focus()}
function openEdit(e){state.editing=e;$('editAmount').value=Number(e.amount).toLocaleString('ko-KR');$('editItem').value=e.item;$('editDate').value=e.date;$('editSheet').classList.add('open')}
async function saveEdit(){const e=state.editing;if(!e)return;const next={amount:parseAmount($('editAmount').value),item:$('editItem').value.trim()||'지출',date:$('editDate').value,month:$('editDate').value.slice(0,7),updatedAtMs:Date.now()};if(state.user){await updateDoc(doc(state.db,'users',state.user.uid,'expenses',e.cloudId),{...next,updatedAt:serverTimestamp()})}else{Object.assign(e,next);saveLocal();render()}$('editSheet').classList.remove('open')}
async function removeExpense(e=state.editing){if(!e||!confirm('이 지출을 삭제할까요?'))return;if(state.user)await deleteDoc(doc(state.db,'users',state.user.uid,'expenses',e.cloudId));else{state.expenses=state.expenses.filter(x=>x.id!==e.id);saveLocal();render()}$('editSheet').classList.remove('open')}
function stopListeners(){state.unsubBudget?.();state.unsubExpenses?.();state.unsubBudget=state.unsubExpenses=null}
function startListeners(){stopListeners();const key=monthKey(state.month);state.unsubBudget=onSnapshot(doc(state.db,'users',state.user.uid,'budgets',key),s=>{state.budget=s.exists()?Number(s.data().amount||0):0;render()});const{start,end}=monthRange();const q=query(collection(state.db,'users',state.user.uid,'expenses'),where('date','>=',start),where('date','<',end),orderBy('date','desc'));state.unsubExpenses=onSnapshot(q,s=>{state.expenses=s.docs.map(d=>({cloudId:d.id,...d.data()}));render()},e=>{console.error(e);$('footerText').textContent='Firestore 색인이 필요할 수 있습니다. 콘솔 오류를 확인하세요.'})}
async function migrateLocal(){const marker=`budget_migrated_${state.user.uid}`;if(localStorage.getItem(marker))return;const batch=writeBatch(state.db);for(let i=0;i<12;i++){const d=new Date();d.setMonth(d.getMonth()-i);const mk=monthKey(d);const b=Number(localStorage.getItem(`budget_${mk}`)||0);if(b)batch.set(doc(state.db,'users',state.user.uid,'budgets',mk),{amount:b,migrated:true,updatedAt:serverTimestamp()},{merge:true});const ex=JSON.parse(localStorage.getItem(`expenses_${mk}`)||'[]');for(const e of ex)batch.set(doc(collection(state.db,'users',state.user.uid,'expenses')),{...e,month:e.date?.slice(0,7)||mk,migrated:true,createdAt:serverTimestamp()})}await batch.commit();localStorage.setItem(marker,'1')}
function authUI(){const signed=!!state.user;$('signedOut').hidden=signed;$('signedIn').hidden=!signed;$('accountBtn').textContent=signed?'계정':'로그인';$('syncDot').classList.toggle('online',signed);$('syncTitle').textContent=signed?'클라우드 동기화 중':'기기 저장 모드';$('syncSub').textContent=signed?state.user.email:'로그인하면 모든 기기에서 자동 동기화됩니다.';$('footerText').textContent=signed?'변경사항이 계정에 자동 저장됩니다.':'로그인 전에는 이 기기에 저장됩니다.';if(signed)$('signedInEmail').textContent=state.user.email}
async function initFirebase(){if(!configured()){$('firebaseSetup').hidden=false;return}try{const app=initializeApp(FIREBASE_CONFIG);state.auth=getAuth(app);await setPersistence(state.auth,browserLocalPersistence);state.db=initializeFirestore(app,{localCache:persistentLocalCache({tabManager:persistentMultipleTabManager()})});state.cloudReady=true;onAuthStateChanged(state.auth,async user=>{state.user=user;authUI();if(user){await migrateLocal();startListeners()}else{stopListeners();loadLocal()}})}catch(e){console.error(e);$('authMessage').textContent='Firebase 초기화에 실패했습니다.'}}
function changeMonth(delta){state.month=new Date(state.month.getFullYear(),state.month.getMonth()+delta,1);if(state.user)startListeners();else loadLocal()}
$('todayText').textContent=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});$('dateInput').value=todayKey();['amountInput','budgetInput','editAmount'].forEach(id=>$(id).addEventListener('blur',e=>formatInput(e.target)));$('saveExpense').onclick=addExpense;$('saveBudget').onclick=setBudget;$('saveEdit').onclick=saveEdit;$('deleteEdit').onclick=()=>removeExpense();$('prevMonth').onclick=()=>changeMonth(-1);$('nextMonth').onclick=()=>changeMonth(1);$('settingsBtn').onclick=()=>{$('budgetInput').value=state.budget?state.budget.toLocaleString('ko-KR'):'';$('settingsMessage').textContent='';$('settingsSheet').classList.add('open')};$('accountBtn').onclick=()=>$('accountSheet').classList.add('open');document.querySelectorAll('.sheet-wrap').forEach(s=>s.onclick=e=>{if(e.target===s)s.classList.remove('open')});document.querySelectorAll('.seg button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.seg button').forEach(x=>x.classList.remove('active'));b.classList.add('active');state.view=b.dataset.view;renderList()});$('loginBtn').onclick=async()=>{if(!state.cloudReady){$('authMessage').textContent='Firebase 설정값을 먼저 입력해주세요.';return}try{await signInWithEmailAndPassword(state.auth,$('emailInput').value.trim(),$('passwordInput').value);$('accountSheet').classList.remove('open')}catch(e){$('authMessage').textContent='로그인에 실패했습니다.'}};$('signupBtn').onclick=async()=>{if(!state.cloudReady){$('authMessage').textContent='Firebase 설정값을 먼저 입력해주세요.';return}try{await createUserWithEmailAndPassword(state.auth,$('emailInput').value.trim(),$('passwordInput').value);$('accountSheet').classList.remove('open')}catch(e){$('authMessage').textContent=e.code==='auth/email-already-in-use'?'이미 사용 중인 이메일입니다.':'회원가입에 실패했습니다. 비밀번호는 6자 이상이어야 합니다.'}};$('logoutBtn').onclick=async()=>{await signOut(state.auth);$('accountSheet').classList.remove('open')};$('amountInput').addEventListener('keydown',e=>{if(e.key==='Enter')$('itemInput').focus()});$('itemInput').addEventListener('keydown',e=>{if(e.key==='Enter')addExpense()});
loadLocal();authUI();render();initFirebase();
</script>
